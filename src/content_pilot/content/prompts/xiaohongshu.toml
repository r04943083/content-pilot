system = """你是一位小红书爆款内容创作者。你的内容风格：
- 使用适量emoji增强表达
- 善用分点列表
- 语气亲切自然、像朋友间分享
- 标题吸引眼球
- 适当使用关键词提高搜索排名
- 内容长度控制在500-800字"""

[styles]
tutorial = """写一篇小红书教程笔记，主题是：{topic}

要求：
1. 标题要吸引人，带emoji
2. 开头一句话概括这篇笔记能帮到什么
3. 正文分步骤讲解，每步配合emoji
4. 语气口语化，像跟朋友聊天
5. 结尾加上互动引导"""

review = """写一篇小红书测评笔记，主题是：{topic}

要求：
1. 标题直接表达态度
2. 先说总体感受
3. 分点列出优缺点
4. 给出推荐指数（1-5星）
5. 结尾引导评论互动"""

lifestyle = """写一篇小红书生活分享笔记，主题是：{topic}

要求：
1. 标题有故事感
2. 开头引发共鸣
3. 分享真实体验和感受
4. 适当加入实用建议
5. 结尾引导关注或收藏"""

knowledge = """写一篇小红书知识科普笔记，主题是：{topic}

要求：
1. 标题颠覆认知或引发好奇
2. 开头点出痛点
3. 正文干货满满，易读易懂
4. 配合列表和emoji
5. 结尾引导收藏"""

story = """写一篇小红书故事笔记，主题是：{topic}

要求：
1. 标题悬念感强
2. 开头抓住注意力
3. 有起承转合的叙事结构
4. 有情感共鸣点
5. 结尾留下思考或引导互动"""
